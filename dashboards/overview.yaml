type: canvas
display_name: "PetSmart Charities — Transport Grant Final Report"
theme: apa
max_width: 1400

defaults:
  time_range: inf
  comparison_mode: none

rows:
  # ── Header ──────────────────────────────────────────────────────────────────
  - items:
      - width: 3
        image:
          url: https://raw.githubusercontent.com/joslyncavitt01/apa-assets/master/apa_logo.svg
          alignment:
            horizontal: left
            vertical: middle
      - width: 5
        markdown:
          content: ""
      - width: 4
        image:
          url: https://raw.githubusercontent.com/joslyncavitt01/apa-assets/master/petsmart_charities_logo.png
          alignment:
            horizontal: right
            vertical: middle
    height: 100px

  # ── Grant title ─────────────────────────────────────────────────────────────
  - items:
      - width: 12
        markdown:
          content: >
            ## PetSmart Charities — National Transport Program

            Application 2025-9945 · Grant Amount: **$40,000** · Grant Period:
            Apr 15, 2025 – Apr 1, 2026 · **Final Report due May 1, 2026**
          alignment:
            horizontal: left
            vertical: middle
    height: 64px

  # ── Divider label ───────────────────────────────────────────────────────────
  - items:
      - width: 12
        markdown:
          content: "#### Grant Goal: Transport a Minimum of 1,000 Animals"
          alignment:
            horizontal: left
            vertical: middle
    height: 28px

  # ── Primary KPIs ────────────────────────────────────────────────────────────
  - items:
      - width: 12
        kpi_grid:
          metrics_view: transport_out
          measures:
            - total_transported
            - dogs_transported
            - cats_transported
            - pct_of_goal
    height: 140px

  # ── Secondary KPIs ──────────────────────────────────────────────────────────
  - items:
      - width: 3
        kpi_grid:
          metrics_view: transport_in
          measures:
            - source_shelter_count
          sparkline: none
          hide_time_range: true
      - width: 3
        kpi_grid:
          metrics_view: transport_out
          measures:
            - total_partners
          sparkline: none
          hide_time_range: true
      - width: 3
        kpi_grid:
          metrics_view: transport_out
          measures:
            - petsmart_partners_active
          sparkline: none
          hide_time_range: true
      - width: 3
        kpi_grid:
          metrics_view: transport_out
          measures:
            - states_reached
          sparkline: none
          hide_time_range: true
    height: 140px

  # ── Progress toward goal ────────────────────────────────────────────────────
  - items:
      - width: 12
        markdown:
          content: "## Progress Toward Grant Goal"
          alignment:
            horizontal: left
            vertical: middle
    height: 36px

  - items:
      - width: 12
        line_chart:
          metrics_view: progress
          title: "Cumulative Animals Transported vs. Grant Goal (1,000)"
          color:
            field: series
            type: nominal
            colorMapping:
              - value: Actual
                color: "#D85928"
              - value: "On-Pace Goal (1,000)"
                color: "#A2C139"
          x:
            field: month
            type: temporal
          y:
            field: value
            type: quantitative
            zeroBasedOrigin: true
          vl_config: >
            {
              "view": {"stroke": null},
              "axis": {"grid": false, "ticks": false, "domain": false, "labelFontSize": 11, "labelOpacity": 0.6},
              "axisY": {"grid": true, "gridOpacity": 0.08, "tickCount": 5},
              "axisX": {"labelAngle": -30, "format": "%b %Y"},
              "line": {"strokeWidth": 2.5}
            }
    height: 320px

  # ── Approved partners note ───────────────────────────────────────────────────
  - items:
      - width: 12
        markdown:
          content: >
            > All metrics above reflect APA!'s full National Transport Program
            during the grant period. Animals were transported to **64 destination
            partners** across 15 states, including 19 of the 22 organizations
            listed in the approved grant application.
          alignment:
            horizontal: left
            vertical: middle
    height: 48px

  # ── Monthly volume ──────────────────────────────────────────────────────────
  - items:
      - width: 12
        markdown:
          content: "## Monthly Transport Volume"
          alignment:
            horizontal: left
            vertical: middle
    height: 36px

  - items:
      - width: 12
        stacked_bar:
          metrics_view: transport_out
          title: Animals Transported by Month (Dogs vs. Cats)
          color:
            field: species
            type: nominal
            colorMapping:
              - value: Dog
                color: "#D85928"
              - value: Cat
                color: "#A2C139"
          x:
            field: transport_date
            type: temporal
            limit: 13
          y:
            field: total_transported
            type: quantitative
            zeroBasedOrigin: true
    height: 300px

  # ── PetSmart-Approved Partners ───────────────────────────────────────────────
  - items:
      - width: 12
        markdown:
          content: "## Animals Received by Destination Partner"
          alignment:
            horizontal: left
            vertical: middle
    height: 36px

  - items:
      - width: 6
        leaderboard:
          metrics_view: transport_out
          title: Animals Received by Destination Partner
          dimensions:
            - destination_partner
          measures:
            - total_transported
          num_rows: 64
      - width: 6
        bar_chart:
          metrics_view: transport_out
          title: By State
          color: "#D85928"
          x:
            field: destination_state
            type: nominal
            sort: "-y"
            limit: 12
          y:
            field: total_transported
            type: quantitative
    height: 380px

  # ── Source Shelters ──────────────────────────────────────────────────────────
  - items:
      - width: 12
        markdown:
          content: "## Texas Source Shelters"
          alignment:
            horizontal: left
            vertical: middle
    height: 36px

  - items:
      - width: 12
        markdown:
          content: >
            Under-resourced Texas shelters APA! pulled from during the grant
            period. APA! covers all transport prep costs — veterinary care,
            health certificates, and transport — at no charge to source
            shelters.
          alignment:
            horizontal: left
            vertical: middle
    height: 32px

  - items:
      - width: 5
        leaderboard:
          metrics_view: transport_in
          title: Animals Received by Shelter
          dimensions:
            - source_shelter
          measures:
            - animals_received
          num_rows: 20
      - width: 7
        stacked_bar:
          metrics_view: transport_in
          title: Monthly Intake from Source Shelters
          color:
            field: species
            type: nominal
            colorMapping:
              - value: Dog
                color: "#D85928"
              - value: Cat
                color: "#A2C139"
          x:
            field: intake_date
            type: temporal
            limit: 13
          y:
            field: animals_received
            type: quantitative
            zeroBasedOrigin: true
    height: 380px

  # ── Actual vs. projected ─────────────────────────────────────────────────────
  - items:
      - width: 12
        markdown:
          content: "## Actual vs. Projected by Approved Partner"
          alignment:
            horizontal: left
            vertical: middle
    height: 36px

  - items:
      - width: 12
        bar_chart:
          metrics_view: partner_comparison_long
          title: "Destination Partners — Projected vs. Actual"
          color:
            field: series
            type: nominal
            colorMapping:
              - value: Actual
                color: "#D85928"
              - value: Projected
                color: "#A2C139"
          x:
            field: partner_name
            type: nominal
            sort: "-y"
          y:
            field: value
            type: quantitative
            zeroBasedOrigin: true
    height: 360px

  - items:
      - width: 12
        leaderboard:
          metrics_view: partner_vs_projected
          title: "Detail: Projected vs. Actual vs. Variance"
          dimensions:
            - partner_name
          measures:
            - projected
            - actual
            - variance
            - pct_of_projected
          num_rows: 22
    height: 460px

  # ── Source shelter comparison ─────────────────────────────────────────────────
  - items:
      - width: 12
        markdown:
          content: "## Actual vs. Projected by Source Shelter"
          alignment:
            horizontal: left
            vertical: middle
    height: 36px

  - items:
      - width: 12
        bar_chart:
          metrics_view: source_comparison_long
          title: "Source Shelters — Projected vs. Actual (approved list only)"
          color:
            field: series
            type: nominal
            colorMapping:
              - value: Actual
                color: "#D85928"
              - value: Projected
                color: "#A2C139"
          x:
            field: shelter_name
            type: nominal
            sort: "-y"
          y:
            field: value
            type: quantitative
            zeroBasedOrigin: true
    height: 360px

  - items:
      - width: 12
        markdown:
          content: >
            > APA! transported from **19 of 19 approved source shelters** during
            the grant period, plus an additional **32 Texas shelters** beyond the
            approved list — 51 source communities total. Top non-listed sources
            include Laredo Animal Care Services (518), Bastrop County Animal
            Services (191), and Pecos Animal Shelter (140).
          alignment:
            horizontal: left
            vertical: middle
    height: 56px

  # ── Footer ───────────────────────────────────────────────────────────────────
  - items:
      - width: 12
        markdown:
          content: >
            *Source: Austin ShelterLuv (apa-data-410213) · Outcome type:
            "Transport Partner Out" · Intake type: "Transport Held at APATH" ·
            Grant period: Apr 15, 2025 – Apr 1, 2026 · PetSmart partner list per
            approved grant application 2025-9945 · Prepared by Joslyn Cavitt,
            Austin Pets Alive!*
          alignment:
            horizontal: left
            vertical: middle
    height: 36px
